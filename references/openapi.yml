    ObjectiveOption:
      type: object
      description: A pre-defined option for an objective disposition. Supports recursive `sub_options` for hierarchical classifications.
      required:
        - value
        - condition
      properties:
        value:
          type: string
          description: The value returned when this option is selected.
          example: interested
        condition:
          type: string
          description: Natural-language condition describing when this option should be selected.
          example: Customer expressed genuine interest and agreed to a next step
        sub_options:
          type: array
          description: Optional nested options for hierarchical classifications. Each item has the same structure as `ObjectiveOption`.
          items:
            $ref: '#/components/schemas/ObjectiveOption'

    SubjectiveTypeConfig:
      type: object
      description: Configuration for the `regex` subjective type. Required when `subjective_type` is `regex`.
      required:
        - pattern
      properties:
        pattern:
          type: string
          description: The regular expression the free-text response must match.
          example: "^\\d{10}$"
        description:
          type: string
          description: Optional human-readable description of the expected format.
          example: 10-digit phone number

    Disposition:
      type: object
      description: An LLM-powered post-call classifier that labels call outcomes from transcripts.
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the disposition.
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        name:
          type: string
          description: Display name shown in results.
          example: Call Outcome
        question:
          type: string
          description: The prompt sent to the LLM to evaluate the transcript.
          example: What was the outcome of the call?
        system_prompt:
          type: string
          nullable: true
          description: Optional system context for the LLM.
          example: You are analyzing a sales call transcript.
        category:
          type: string
          description: Grouping label for the disposition.
          default: General
          example: Lead Quality
        model:
          type: string
          description: LLM model used for evaluation.
          default: gpt-4.1-mini
          example: gpt-4.1-mini
        is_subjective:
          type: boolean
          description: Enables free-text response.
          default: false
          example: true
        is_objective:
          type: boolean
          description: Enables pre-defined value selection.
          default: false
          example: true
        subjective_type:
          type: string
          description: Format constraint for free-text responses. Only allowed when `is_subjective` is `true`.
          enum:
            - text
            - timestamp
            - numeric
            - boolean
            - email
            - regex
          default: text
        subjective_type_config:
          allOf:
            - $ref: '#/components/schemas/SubjectiveTypeConfig'
          nullable: true
          description: Configuration for the `regex` subjective type. Required when `subjective_type` is `regex`.
        objective_options:
          type: array
          nullable: true
          description: Pre-defined options. Required when `is_objective` is `true`.
          items:
            $ref: '#/components/schemas/ObjectiveOption'
        agent_ids:
          type: array
          description: List of agent IDs this disposition is linked to.
          items:
            type: string
          example: ["agt_abc123"]
        created_by:
          type: string
          description: ID of the user who created this disposition.
          example: user_abc123
        created_at:
          type: string
          format: date-time
          description: ISO timestamp when the disposition was created.
          example: "2026-03-01T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: ISO timestamp when the disposition was last updated.
          example: "2026-03-15T14:30:00Z"

    DispositionCreate:
      type: object
      description: |
        Request body for creating a disposition.

        At least one of `is_subjective` or `is_objective` must be `true`. When `is_objective` is `true`, `objective_options` is required and must be non-empty. When `subjective_type` is `regex`, `subjective_type_config` with a `pattern` is required.
      required:
        - name
        - question
      properties:
        name:
          type: string
          description: Display name shown in results.
          example: Call Outcome
        question:
          type: string
          description: The prompt sent to the LLM to evaluate the transcript.
          example: What was the final outcome of this call?
        category:
          type: string
          description: Grouping label for the disposition.
          default: General
          example: Lead Quality
        agent_id:
          type: string
          format: uuid
          description: If provided, links the disposition to this agent on creation.
        system_prompt:
          type: string
          description: Optional system context for the LLM.
        model:
          type: string
          description: LLM model to use for evaluation.
          default: gpt-4.1-mini
          example: gpt-4.1-mini
        is_subjective:
          type: boolean
          description: Enable free-text response.
          default: false
          example: true
        is_objective:
          type: boolean
          description: Enable pre-defined value selection.
          default: false
          example: true
        subjective_type:
          type: string
          description: Format constraint for free-text responses. Only allowed when `is_subjective` is `true`.
          enum:
            - text
            - timestamp
            - numeric
            - boolean
            - email
            - regex
          default: text
        subjective_type_config:
          allOf:
            - $ref: '#/components/schemas/SubjectiveTypeConfig'
          nullable: true
          description: Required when `subjective_type` is `regex`.
        objective_options:
          type: array
          description: Required when `is_objective` is `true`. Must be non-empty.
          items:
            $ref: '#/components/schemas/ObjectiveOption'
          example:
            - value: interested
              condition: Customer expressed genuine interest and agreed to a next step
            - value: not_interested
              condition: Customer declined or was unresponsive to all proposals
            - value: follow_up
              condition: Customer asked to be contacted again at a later time

    DispositionUpdate:
      type: object
      description: Request body for updating a disposition. All fields are optional — only included fields are changed.
      properties:
        agent_id:
          type: string
          format: uuid
          description: If provided, enables scoped (copy-on-write) mode.
        name:
          type: string
          description: New display name.
          example: Next Step Agreed
        question:
          type: string
          description: Updated LLM evaluation prompt.
        category:
          type: string
          description: New category label.
          example: Conversion
        system_prompt:
          type: string
          description: Updated LLM system context.
        model:
          type: string
          description: Updated LLM model.
          example: gpt-4.1-mini
        is_subjective:
          type: boolean
          description: Enable or disable free-text response.
        is_objective:
          type: boolean
          description: Enable or disable pre-defined value selection.
        subjective_type:
          type: string
          description: Format constraint for free-text responses.
          enum:
            - text
            - timestamp
            - numeric
            - boolean
            - email
            - regex
        subjective_type_config:
          allOf:
            - $ref: '#/components/schemas/SubjectiveTypeConfig'
          nullable: true
          description: Configuration for the `regex` subjective type.
        objective_options:
          type: array
          description: Updated list of pre-defined options.
          items:
            $ref: '#/components/schemas/ObjectiveOption'

    DispositionBulkCreateItem:
      type: object
      description: A single disposition entry in a bulk-create request.
      required:
        - name
        - question
      properties:
        name:
          type: string
          description: Display name shown in results.
          example: Agent Handover Needed
        question:
          type: string
          description: LLM evaluation prompt.
          example: Did the customer explicitly ask to speak with a human agent?
        category:
          type: string
          description: Grouping label.
          default: General
          example: Escalation
        system_prompt:
          type: string
          description: Optional system context for the LLM.
        model:
          type: string
          description: LLM model to use for evaluation.
          default: gpt-4.1-mini
          example: gpt-4.1-mini
        is_subjective:
          type: boolean
          description: Enable free-text response.
          default: false
        is_objective:
          type: boolean
          description: Enable pre-defined value selection.
          default: false
        subjective_type:
          type: string
          description: Format constraint for free-text responses. Only allowed when `is_subjective` is `true`.
          enum:
            - text
            - timestamp
            - numeric
            - boolean
            - email
            - regex
          default: text
        subjective_type_config:
          allOf:
            - $ref: '#/components/schemas/SubjectiveTypeConfig'
          nullable: true
          description: Required when `subjective_type` is `regex`.
        objective_options:
          type: array
          description: Required when `is_objective` is `true`.
          items:
            $ref: '#/components/schemas/ObjectiveOption'

    DispositionBulkCreate:
      type: object
      description: Request body for atomically creating multiple dispositions linked to an agent.
      required:
        - agent_id
        - dispositions
      properties:
        agent_id:
          type: string
          format: uuid
          description: The agent all dispositions will be linked to.
        dispositions:
          type: array
          minItems: 1
          description: Non-empty array of disposition objects to create.
          items:
            $ref: '#/components/schemas/DispositionBulkCreateItem'

    DispositionCreateResponse:
      type: object
      description: Standard response for create/update/delete operations on a single disposition.
      properties:
        message:
          type: string
          example: Disposition created successfully
        id:
          type: string
          format: uuid
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"

    DispositionBulkCreateResponse:
      type: object
      description: Response returned after a successful bulk-create. The `ids` array preserves the input order.
      properties:
        message:
          type: string
          example: Dispositions created successfully
        ids:
          type: array
          description: IDs of the newly created dispositions, in the same order as the input `dispositions` array.
          items:
            type: string
            format: uuid
          example:
            - "3fa85f64-5717-4562-b3fc-2c963f66afa6"
            - "7cb91a23-1234-4321-b2fc-1c963f11bde4"

    DispositionTestRequest:
      type: object
      description: Request body for testing an agent's dispositions against a transcript.
      required:
        - transcript
      properties:
        transcript:
          type: string
          maxLength: 50000
          description: The call transcript to run dispositions against.
          example: "Agent: Hi, how can I help you today? Customer: I am interested in your enterprise plan and would like to know more about pricing."
        call_date:
          type: string
          format: date-time
          description: Optional ISO 8601 date/datetime string for temporal context.
          example: "2026-04-01T10:00:00Z"

    DispositionTestResponse:
      type: object
      description: Grouped disposition results in the same format as post-call execution data.
      properties:
        extracted_data:
          type: object
          description: Results grouped by category and disposition name. Each leaf contains `subjective` (free-text) and/or `objective` (pre-defined value) fields.
          additionalProperties:
            type: object
            additionalProperties:
              type: object
              properties:
                subjective:
                  type: string
                objective:
                  type: string
          example:
            Lead Quality:
              Call Outcome:
                subjective: "Customer expressed strong interest and asked about enterprise pricing."
                objective: interested
            Escalation:
              Agent Handover Needed:
                subjective: ""
                objective: "No"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
