          type: string
          description: Name of the extraction template.
          example: "Lead Qualification"
        json_schema:
          type: object
          description: JSON schema defining the structure of extracted data.
          example:
            type: object
            properties:
              lead_quality:
                type: string
                enum: ["hot", "warm", "cold"]
              budget_range:
                type: string
              timeline:
                type: string
        instructions:
          type: string
          nullable: true
          description: Optional instructions for the extraction model.
          example: "Extract the lead quality, budget, and timeline from the conversation."
        model:
          type: string
          description: The LLM model used for extraction.
          default: "gpt-4.1-mini"
