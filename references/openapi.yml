          default: null
          nullable: true

      type: object
      required:
        - llm_agent
        - synthesizer
        - transcriber
        - input
        - output

    Tools:
      properties:
        name:
          type: string
          description: Name of the function tool
        key:
          type: string
          enum:
            - transfer_call
            - book_appointment
            - check_availability_of_slots
            - custom_task
          default: custom_task
        description:
          type: string
          description: Prompt to be fed for the function tool
        parameters:
          type: object
          description: Definition for the function tool
      type: object
      title: agentstatus

    ApiTools:
      type: object
      properties:
        tools:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/TransferCallTools'
          description: Description of all the tools you'd like to add to the agent. It needs to be a JSON string as this will be passed to LLM.
        tools_params:
          type: object
          description: Parameters for each tool, where keys must match the `name` field in the `tools` array.
          $ref: '#/components/schemas/TransferCallToolParams'
      default: null

    TransferCallToolParams:
      type: object
      properties:
        transfer_call_support:
          type: object
          properties:
            method:
              type: string
              enum:
                - POST
                - GET
              default: GET
              description: Type of request
              example: "POST"
            url:
              type: string
              format: uri
              description: Link of the URL to control the transferring of call
              example: null
              nullable: true
            api_token:
              type: string
              example: null
              nullable: true
              description: API Token in case the URL needs authentication
            param:
              description: Stringified JSON of the tool schema
              type: string
              example: "{\"call_transfer_number\": \"+19876543210\",\"call_sid\": \"%(call_sid)s\"}"

    TransferCallTools:
      title: "transfer_call"
      properties:
        name:
          type: string
          description: Any unique name for this function tool
          example: "transfer_call_support"
        key:
          type: string
          enum:
            - transfer_call
          default: transfer_call
        description:
          type: string
          description: Use this tool to transfer the call
          example: Use this tool to transfer the call
        parameters:
          type: object
          properties:
            type:
              type: string
              example: "object"  # Example value for the "type" property
            properties:
              type: object
              properties:
                call_sid:
                  type: object
                  properties:
                    type:
                      type: string
                      example: "string"
                    description:
                      type: string
                      description: "unique call id"
                      example: "unique call id"
            required:
              type: array
              items:
                type: string
                enum:
                  - call_sid
              example:
                - - call_sid

    ConversationConfig:
      properties:
        hangup_after_silence:
          anyOf:
          - type: integer
          title: Hangup After Silence
          description: Time to wait in seconds before hanging up in case user doesn't speak a thing
          default: 10
          example: 10
        incremental_delay:
          anyOf:
          - type: integer
          title: Incremental Delay
          description: Since we work with interim results, this will dictate the linear delay to add before speaking everytime we get a partial transcript from ASR
          default: 400
          example: 400
        number_of_words_for_interruption:
          anyOf:
          - type: integer
          title: Number Of Words For Interruption
          description: To avoid accidental interruption, how many words should we wait for before interrupting
          default: 2
          example: 2
        hangup_after_LLMCall:
          type: boolean
          title: Hangup After Llmcall
          description: Weather to use LLM prompt to hang up or not. Pretty soon this will be replaced by predefined function
          default: false
          example: false
        call_cancellation_prompt:
          anyOf:
          - type: string
          title: Call Cancellation Prompt
          example: null
        backchanneling:
          anyOf:
          - type: boolean
          title: Backchanneling
          description: This will enable agent to acknowledge when user is speaking long sentences
          default: false
          example: false
        backchanneling_message_gap:
          anyOf:
          - type: integer
          title: Backchanneling Message Gap
          description: Gap between every successive acknowledgement. We will also add a random jitter to this value to make it more random 
          default: 5
          example: 5
        backchanneling_start_delay:
          anyOf:
          - type: integer
          title: Backchanneling Start Delay
          description: Basic delay after which we should start with backchanneling
          default: 5
          example: 5
        ambient_noise_track:
          type: string
          title: Ambient Noise Track
          description: ID of the ambient noise track to play during calls. Use a preset track ID (e.g. `coffee-shop`, `office-ambience`, `call-center`) or the ID of a custom track uploaded via `POST /ambient-sounds/custom`. Set to `null` to disable ambient noise. Only supported with Plivo and Vobiz telephony providers.
          default: null
          example: coffee-shop
        call_terminate:
          anyOf:
          - type: integer
          title: Terminate a call after specified number of seconds
          description: The call automatically disconnects reaching this limit
          default: 90
          example: 90
        voicemail:
          type: boolean
          default: false
          description: Enable voicemail detection. Agent will automatically disconnect the call if voicemail is detected
        inbound_limit:
          type: integer
          default: -1
          description: Set the number of times each phone number is allowed to call. Put `-1` to allow unlimited calls.
        whitelist_phone_numbers:
          type: array
          example: null
          items:
            type: string
            format: uuid
          description: Add phone numbers here that should never be restricted by the call limits (ideal for internal or testing numbers). Phone number should have acountry code (in [E.164](https://en.wikipedia.org/wiki/E.164) format)
        disallow_unknown_numbers:
          type: boolean
          default: false
          description: Only allow incoming calls from the numbers you've sourced using IngestSourceConfig.

      type: object
      title: ConversationConfig

