          description: The page of results to retrieve (starts from `1`).

        - in: "query"
          name: "page_size"
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
          description: Number of results per page.

      responses:
        '200':
          description: Paginated list of violations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViolationList'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /violations/submit:
    post:
      description: Submit a violation with an associated file (e.g., screenshot or evidence image).
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                violation_id:
                  type: string
                  description: The unique identifier of the violation to submit.
                  example: "ce23f363-131a-47fc-8a33-258141a575b0"
                violation_file:
                  type: string
                  format: binary
                  description: The evidence file to attach to the violation (e.g., an image or document).
              required:
                - violation_id
                - violation_file
      responses:
        '200':
          description: Violation submitted successfully
          content:
            application/json:
              example:
                message: success
                state: submitted
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /dispositions/:
    get:
      description: List dispositions accessible to your account. When `agent_id` is provided, only dispositions linked to that agent are returned; otherwise all dispositions you own are returned.
      parameters:
        - in: "query"
          name: "agent_id"
          required: false
          schema:
            type: string
            format: uuid
          description: If provided, returns only dispositions linked to this agent.
      responses:
        '200':
          description: List of dispositions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Disposition'
        '403':
          description: Access denied — `agent_id` does not belong to your account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      description: Create a new disposition. If `agent_id` is provided, the disposition is automatically linked to that agent upon creation.
      requestBody:
        description: Disposition to create.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispositionCreate'
        required: true
      responses:
        '201':
          description: Disposition created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispositionCreateResponse'
        '403':
          description: Access denied for the given `agent_id`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error — e.g., `is_objective` is `true` but `objective_options` is missing or empty
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /dispositions/bulk:
    post:
      description: Atomically create and link multiple dispositions to an agent in a single request. Either all dispositions are created and linked, or none are.
      requestBody:
        description: Bulk-create dispositions for an agent.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispositionBulkCreate'
        required: true
      responses:
        '201':
          description: Dispositions created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispositionBulkCreateResponse'
        '403':
          description: Access denied — `agent_id` does not belong to your account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error — empty `dispositions` array or `is_objective` without `objective_options`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to create dispositions — transaction rolled back, no dispositions were created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /dispositions/{disposition_id}:
    get:
      description: Retrieve a single disposition by ID, optionally scoped to a specific agent.
      parameters:
        - in: "path"
          name: "disposition_id"
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the disposition to retrieve.
        - in: "query"
          name: "agent_id"
          required: false
          schema:
            type: string
            format: uuid
          description: If provided, returns the disposition only if it is linked to this agent.
      responses:
        '200':
          description: Disposition found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Disposition'
        '403':
          description: Access denied — disposition or agent does not belong to your account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Disposition not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      description: |
        Update an existing disposition. All fields in the request body are optional — only fields you include are changed.

        When `agent_id` is provided (scoped mode), the API checks whether the disposition is exclusive to that agent:
        - If exclusive, it is edited in place and `200 OK` is returned.
        - If shared, a new private copy is created for this agent and the agent is re-linked to the copy; the original disposition is unchanged and `201 Created` is returned with the new ID.

        When `agent_id` is not provided (unscoped mode), admins can update any disposition; non-admin users can only update dispositions they own.
      parameters:
        - in: "path"
          name: "disposition_id"
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the disposition to update.
      requestBody:
        description: Fields to update on the disposition.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispositionUpdate'
        required: true
      responses:
        '200':
          description: Disposition updated in place
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispositionCreateResponse'
              example:
                message: Disposition updated successfully
                id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        '201':
          description: Copy-on-write — a new disposition copy was created and linked to the agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispositionCreateResponse'
              example:
                message: Disposition copy created and linked to agent
                id: "9ab12c34-5678-4321-b3fc-7d852f33caf1"
        '400':
          description: No valid fields provided to update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Disposition not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      description: |
        Permanently delete a disposition and remove its link to any associated agents.

        Regular users can only delete dispositions they own (`created_by` matches their user ID). Admins can delete any disposition. Historical call execution results already containing this disposition's output are not affected — only future calls will stop evaluating it.
      parameters:
        - in: "path"
          name: "disposition_id"
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the disposition to delete.
      responses:
        '200':
          description: Disposition deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispositionCreateResponse'
              example:
                message: Disposition deleted successfully
                id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        '403':
          description: Access denied — you do not own this disposition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Disposition not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v2/agent/{agent_id}/dispositions/test:
    post:
      description: Run all dispositions linked to the specified agent against a provided transcript and return the grouped results. Useful for validating your disposition setup before going live.
      parameters:
        - in: "path"
          name: "agent_id"
          required: true
          schema:
            type: string
            format: uuid
          description: The agent whose dispositions will be evaluated.
      requestBody:
        description: Transcript to evaluate against the agent's dispositions.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispositionTestRequest'
        required: true
      responses:
        '200':
          description: Grouped disposition results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispositionTestResponse'
        '403':
          description: Access denied — agent does not belong to your account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Invalid or unknown `agent_id`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'


components:
  schemas:
    Agent:
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the agent
        agent_name:
          description: Human-readable agent name
          type: string
          example: Alfred
        agent_type:
          description: Type of agent
          type: string
          example: other
        agent_status:
          description: Current status of the agent
          type: string
          enum:
            - seeding
            - processed
          example: processed
        created_at:
          type: string
          format: date-time
          example: '2024-01-23T01:14:37Z'
          description: Timestamp of agent creation
        updated_at:
          type: string
          format: date-time
          example: '2024-01-29T18:31:22Z'
          description: Timestamp of last update for the agent
        tasks:
          items:
            $ref: '#/components/schemas/TasksConfig'
          type: array
          description: An array of tasks that the agent can perform
        agent_prompts:
          $ref: '#/components/schemas/AgentPrompt'
          description: Prompts to be provided to the agent. It can have multiple tasks of the form `task_<task_id>`
      type: object

    AgentV2:
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the agent
        agent_name:
          description: Human-readable agent name
          type: string
          example: Alfred
        agent_type:
          description: Type of agent
          type: string
          example: other
        agent_status:
          description: Current status of the agent
          type: string
          enum:
            - seeding
            - processed
          example: processed
        created_at:
          type: string
          format: date-time
          example: '2024-01-23T01:14:37Z'
          description: Timestamp of agent creation
        updated_at:
          type: string
          format: date-time
          example: '2024-01-29T18:31:22Z'
          description: Timestamp of last update for the agent
        tasks:
          items:
            $ref: '#/components/schemas/TasksConfigV2'
          type: array
          description: An array of tasks that the agent can perform
        ingest_source_config:
          $ref: '#/components/schemas/IngestSourceConfig'
        agent_prompts:
          $ref: '#/components/schemas/AgentPrompt'
          description: Prompts to be provided to the agent. It can have multiple tasks of the form `task_<task_id>`
      type: object

    AgentList:
      items:
        $ref: '#/components/schemas/Agent'
      type: array
      title: Items

    AgentListV2:
      items:
        $ref: '#/components/schemas/AgentV2'
      type: array
      title: Items

    AgentExecution:
      properties:
        id:
          type: string
          format: uuid
          example: "4c06b4d1-4096-4561-919a-4f94539c8d4a"
          description: Unique identifier for the execution
        agent_id:
          type: string
          format: uuid
          description: Unique `id` of the agent
        batch_id:
          type: string
          pattern: ^[a-f0-9]{32}$
          example: "baab7cdc833145bf8dd260ff1f0a3f21"
          description: Unique `id` of the batch
        conversation_duration:
          type: number
          format: float
          description: Total time duration for the conversation (in seconds)
        total_cost:
          type: number
          format: float
          description: Total cost incurred by this execution in cents
        status:
          type: string
          enum: ["scheduled", "queued", "rescheduled", "initiated", "ringing", "in-progress", "call-disconnected", "completed", "balance-low", "busy", "no-answer", "canceled", "failed", "stopped", "error"]
          description: Current status of the call
        error_message:
          type: string
          description: Associated error message (if any)
        answered_by_voice_mail:
          type: boolean
          description: If the call was answered by voice mail
        transcript:
          type: string
          description: Transcription of the execution
        created_at:
          type: string
          format: date-time
          example: '2024-01-23T01:14:37Z'
          description: Timestamp of agent execution
        updated_at:
          type: string
          format: date-time
          example: '2024-01-29T18:31:22Z'
          description: Last updated timestamp for the execution
        cost_breakdown:
          $ref: '#/components/schemas/CostBreakdown'
          description: Breakdown of the costs in cents
        telephony_data:
          $ref: '#/components/schemas/TelephonyData'
          description: Telephony call data
        transfer_call_data:
          $ref: '#/components/schemas/TransferCallData'
          description: Telephony call data
        batch_run_details:
          $ref: '#/components/schemas/BatchRunData'
          description: Batch information
        extracted_data:
          type: object
          nullable: true
          description: Extracted data in JSON format which was mentioned in the agent `extraction_prompt`
          example:
            user_interested: true
            callback_user: false
            address: '42 world lane'
            salary_expected: '42 bitcoins'
        context_details:
          type: object
          description: Custom variable data injected in the call
      type: object

    AgentExecutionV2List:
      properties:
        page_number:
          type: number
          format: integer
          description: The current page number returned in the response. Matches the `page_number` requested in the query.
        page_size:
          type: number
          format: integer
          description: The number of records returned per page. Matches the `page_size` specified in the request.
        total:
          type: number
          format: integer
          description: Number of total executions
        has_more:
          type: boolean
          description: Whether there are more records or not
        data:
          items:
            $ref: '#/components/schemas/AgentExecution'
          type: array
      title: Items

    AgentExecutionList:
      items:
        $ref: '#/components/schemas/AgentExecution'
      type: array
      title: Items

    BatchRunData:
      properties:
        status:
          type: string
          enum: ["scheduled", "queued", "rescheduled", "initiated", "ringing", "in-progress", "call-disconnected", "completed", "balance-low", "busy", "no-answer", "canceled", "failed", "stopped", "error"]
          description: Status of the call initiated using batch
          example: "completed"
        created_at:
          type: string
          format: date-time
          example: '2024-01-23T01:14:37Z'
          description: Timestamp of the execution created by the batch
        updated_at:
          type: string
          format: date-time
          example: '2024-01-29T18:31:22Z'
          description: Last updated timestamp for the execution
        retried:
          type: number
          format: integer
          description: Number of retries made by the batch after initial attempt
          example: 0

    CostBreakdown:
      properties:
        llm:
          type: number
          format: float
          description: Total cost incurred by the LLM in cents
          example: 4.2
        network:
          type: number
          format: float
          description: Total telephony cost in cents
          example: 1.2
        platform:
          type: number
          format: float
          description: Bolna platform cost in cents
          example: 2.0
        synthesizer:
          type: number
          format: float
          description: Total cost incurred by the Synthesizer provider in cents
          example: 6.8
        transcriber:
          type: number
          format: float
          description: Total cost incurred by the Transcriber provider in cents
          example: 0.7


    TelephonyData:
      properties:
        duration:
          type: string
          pattern: ^\d+$
          description: Total duration of the call in seconds
          example: 42
        to_number:
          type: string
          example: "+10123456789"
          description: Phone number of the recipient alongwith country code (in [E.164](https://en.wikipedia.org/wiki/E.164) format)
        from_number:
          type: string
          example: "+19876543007"
          description: Phone number of the sender
        recording_url:
          type: string
          format: uri
          description: Recording URL for the telephone call
          example: "https://bolna-call-recordings.s3.us-east-1.amazonaws.com/AC1f3285e7c353c7d4036544f8dac36b98/REb1c182ccde4ddf7969a511a267d3c669"
        hosted_telephony:
          type: boolean
          description: Whether the call was made using Bolna telephony
        provider_call_id:
          type: string
          description: Unique ID of the call from the Telephony Provider (like Twilio, Plivo, Vonage, etc.)
          example: "CA42fb13614bfcfeccd94cf33befe14s2f"
        call_type:
          type: string
          enum: ["outbound", "inbound"]
          description: The call was an incoming or outgoing call
        provider:
          type: string
          enum: ["twilio", "plivo"]
          description: The telephony call provider
        hangup_by:
          type: string
          description: Source for call hungup
          example: 'Caller'
        hangup_reason:
          type: string
          example: 'Normal Hangup'
          description: Reason of the hungup
        hangup_provider_code:
          type: integer
          example: 4000
          description: Provider specific code for hangup
        ring_duration:
          type: integer
          description: Duration in seconds the phone rang before it was answered or the call ended
          example: 17
        post_dial_delay:
          type: integer
          description: Delay in seconds between dialing and the first ring
          example: 1
        to_number_carrier:
          type: string
          description: The telecom carrier of the recipient's phone number
          example: "Reliance Jio Infocomm Ltd (RJIL)"


    TransferCallData:
      properties:
        provider_call_id:
          type: string
          description: Unique ID of the call from the Telephony Provider (like Twilio, Plivo, Vonage, etc.)
          example: "CA42fb13614bfcfeccd94cf33befe14s2f"
        status:
          type: string
          description: Status of this transferred call
          enum: ["completed", "call-disconnected", "no-answer", "busy", "failed", "in-progress", "canceled", "balance-low", "queued", "ringing", "initiated"]
        duration:
          type: string
          description: Total duration of this transferred call in seconds
          example: 42
        cost:
          type: number
          format: float
          description: Total cost incurred for this transferred call
        to_number:
          type: string
          example: "+10123456789"
          description: Phone number of the recipient alongwith country code (in [E.164](https://en.wikipedia.org/wiki/E.164) format)
        from_number:
          type: string
          example: "+19876543007"
          description: Phone number which is making the transfer call
        recording_url:
          type: string
          format: uri
          description: Recording URL for the transferred call
          example: "https://bolna-call-recordings.s3.us-east-1.amazonaws.com/AC1f3285e7c353c7d4036544f8dac36b98/REb1c182ccde4ddf7969a511a267d3c669"
        hangup_by:
          type: string
          description: Source for transfer call hungup
          example: 'Caller'
        hangup_reason:
          type: string
          example: 'Normal Hangup'
          description: Reason of the transfer call hungup
        hangup_provider_code:
          type: integer
          example: 4000
          description: Provider specific code for transfer call hangup


    ExecutionCostBreakdown:
      properties:
        synthesizer:
          type: number
          format: float
          description: Total cost incurred by the synthesizer
        llm:
          type: number
          format: float
          description: Total cost incurred by the llm
        transcriber:
          type: number
          format: float
          description: Total cost incurred by the transcriber
        network:
          type: number
          format: float
          description: Total cost incurred by the network

    ExecutionUsageBreakdown:
      properties:
        synthesizer_characters:
          type: number
          format: float
          description: Total number of characters synthesized
        synthesizer_model:
          type: string
          description: Synthesizer model used in the execution
          example: polly
        transcriber_duration:
          type: number
          format: float
          description: Total time consumed by transcriber
        transcriber_model:
          type: string
          example: deepgram
          description: Transcriber model used in the execution
        llm_tokens:
          type: number
          format: float
          description: Total number of token generated by the llm
        llm_model:
          $ref: '#/components/schemas/LlmModelExecution'
          description: Cost breakdown for the execution

    LlmModelExecution:
      type: object
      additionalProperties:
        type: object
        properties:
          output:
            type: number
          input:
            type: number
      example:
        gpt-3.5-turbo-16k:
          output: 28.0
          input: 1826.0
        gpt-3.5-standard-8k:
          output: 20.0
          input: 1234.0

    AgentRequest:
      properties:
        agent_config:
          $ref: '#/components/schemas/AgentConfig'
          description: Configuration of the agent
        agent_prompts:
          $ref: '#/components/schemas/AgentPrompt'
          description: Prompts to be provided to the agent. It can have multiple tasks of the form `task_<task_id>`
      type: object
      required:
        - agent_config
        - agent_prompts

    AgentRequestV2:
      properties:
        agent_config:
          $ref: '#/components/schemas/AgentConfigV2'
          description: Configuration of the agent
        agent_prompts:
          $ref: '#/components/schemas/AgentPrompt'
          description: Prompts to be provided to the agent. It can have multiple tasks of the form `task_<task_id>`
      type: object
      required:
        - agent_config
        - agent_prompts

    AgentPrompt:
      properties:
        task_1:
          type: object
          properties:
            system_prompt:
              description: The system prompt fed into the agent
              type: string
              example: What is the Ultimate Question of Life, the Universe, and Everything?
          required:
            - system_prompt
      type: object

    AgentPatchRequest:
      properties:
        agent_config:
          $ref: '#/components/schemas/AgentConfigPatchRequest'
          description: Configuration of the agent
        agent_prompts:
          $ref: '#/components/schemas/AgentPrompt'
          description: Prompts to be provided to the agent. It can have multiple tasks of the form `task_<task_id>`
      type: object


    AgentConfigPatchRequest:
      type: object
      properties:
        agent_name:
          description: The name of the agent
          type: string
          example: Alfred
        agent_welcome_message:
          description: Initial welcome message by agent
          type: string
          example: "How are you doing Bruce?"
        webhook_url:
          description: Webhook URL to receive data for all conversations as [get_execution API](/api-reference/executions/get_execution)
          type: string
          example: null
        synthesizer:
          type: object
          $ref: '#/components/schemas/Synthesizer'
          description: Configuration of Synthesizer model for the agent task
        ingest_source_config:
          $ref: '#/components/schemas/IngestSourceConfig'
        telephony_provider:
          type: string
          description: >-
            The telephony provider to use for this agent. When changed, the agent's audio input/output format is
            automatically updated to match the provider (e.g., `wav` for twilio/plivo/exotel/vobiz, `ulaw` for sip-trunk).
          enum:
            - twilio
            - plivo
            - exotel
            - vobiz
            - sip-trunk
            - default
          example: "sip-trunk"

    AgentConfig:
      required:
        - agent_name
        - tasks
      type: object
      properties:
        agent_name:
          description: The name of the agent
          type: string
          example: Alfred
        agent_welcome_message:
          description: Initial welcome message by agent
          type: string
          example: "How are you doing Bruce?"
        webhook_url:
          description: Webhook URL to receive data for all conversations as [get_execution API](/api-reference/executions/get_execution)
          type: string
          example: "https://my-webhook-url"
        agent_type:
          description: Agent type
          type: string
          example: other
        tasks:
          items:
            $ref: '#/components/schemas/TasksConfig'
          type: array
          description: An array of tasks that the agent can perform

    AgentConfigV2:
      required:
        - agent_name
        - tasks
      type: object
      properties:
        agent_name:
          description: The name of the agent
          type: string
          example: Alfred
        agent_welcome_message:
          description: Initial welcome message by agent
          type: string
          example: "How are you doing Bruce?"
        webhook_url:
          description: Webhook URL to receive data for all conversations as [get_execution API](/api-reference/executions/get_execution)
          type: string
          example: null
        agent_type:
          description: Agent type
          type: string
          example: other
        tasks:
          items:
            $ref: '#/components/schemas/TasksConfigV2'
          type: array
          description: An array of tasks that the agent can perform

        ingest_source_config:
          $ref: '#/components/schemas/IngestSourceConfig'

        calling_guardrails:
          type: object
          description: Time-based restrictions for outbound calls
          properties:
            call_start_hour:
              type: integer
              minimum: 0
              maximum: 23
              description: Start of allowed calling window in 24-hour format (recipient's timezone)
              example: 9
            call_end_hour:
              type: integer
              minimum: 0
              maximum: 23
              description: End of allowed calling window in 24-hour format (recipient's timezone)
              example: 17

    IngestSourceConfig:
      type: object
      description: Configuration for ingestion source used for inbound agents. Required fields vary by `source_type`.
      properties:
        source_type:
          type: string
          enum: [api, csv, google_sheet]
          description: Type of CRM ingestion source
          example: api

        source_url:
          type: string
          format: uri
          nullable: true
          description: API or Google Sheet URL
          example: "https://example.com/api/data"

        source_auth_token:
          type: string
          nullable: true
          description: Bearer token for API authentication
          example: "abc123"

        source_name:
          type: string
          nullable: true
          description: File or sheet name
          example: "leads_sheet_june.csv"

      allOf:
        - if:
            properties:
              source_type:
                const: api
          then:
            required: [source_url, source_auth_token]
        - if:
            properties:
              source_type:
                const: csv
          then:
            required: [source_name]
        - if:
            properties:
              source_type:
                const: google_sheet
          then:
            required: [source_name, source_url]

    TasksConfig:
      properties:
        task_type:
          type: string
          description: Type of task
          enum: ["conversation", "extraction", "summarization", "webhook"]
        tools_config:
          type: object
          $ref: '#/components/schemas/ToolsConfig'
          description: Configuration of multiple tools that form a task
        toolchain:
          type: object
          $ref: '#/components/schemas/Toolchain'
          description: Agent will execute these tools in the specified order
        task_config:
          type: object
          $ref: '#/components/schemas/ConversationConfig'
          description: Should be used onkly in conversation task for now and it consists of all the required configuration for conversational nuances
      type: object

    TasksConfigV2:
      properties:
        task_type:
          type: string
          description: Type of task
          enum: ["conversation", "extraction", "summarization"]
        tools_config:
          type: object
          $ref: '#/components/schemas/ToolsConfigV2'
          description: Configuration of multiple tools that form a task
        toolchain:
          type: object
          $ref: '#/components/schemas/Toolchain'
          description: Agent will execute these tools in the specified order
        task_config:
          type: object
          $ref: '#/components/schemas/ConversationConfig'
          description: Should be used onkly in conversation task for now and it consists of all the required configuration for conversational nuances
      type: object

    ToolsConfig:
      properties:
        llm_agent:
          type: object
          $ref: '#/components/schemas/LlmAgent'
          description: Configuration of LLM model for the agent task
        synthesizer:
          type: object
          $ref: '#/components/schemas/Synthesizer'
          description: Configuration of Synthesizer model for the agent task
        transcriber:
          type: object
          $ref: '#/components/schemas/Transcriber'
          description: Configuration of Transcriber model for the agent task
        input:
          type: object
          $ref: '#/components/schemas/InputOutput'
          description: Configuration of Input handler
        output:
          type: object
          $ref: '#/components/schemas/InputOutput'
          description: Configuration of Output handler
        api_tools:
          type: object
          $ref: '#/components/schemas/ApiTools'
          description: Api tools you'd like the agents to have access to
          default: null
          nullable: true

    ToolsConfigV2:
      properties:
        llm_agent:
          type: object
          $ref: '#/components/schemas/LlmAgentV2'
          description: Configuration of LLM model for the agent task
        synthesizer:
          type: object
          $ref: '#/components/schemas/Synthesizer'
          description: Configuration of Synthesizer model for the agent task
        transcriber:
          type: object
          $ref: '#/components/schemas/Transcriber'
          description: Configuration of Transcriber model for the agent task
        input:
          type: object
          $ref: '#/components/schemas/InputOutput'
          description: Configuration of Input handler
        output:
          type: object
          $ref: '#/components/schemas/InputOutput'
          description: Configuration of Output handler
        api_tools:
          type: object
          $ref: '#/components/schemas/ApiTools'
