openapi: 3.1.0
info:
  title: Bolna API
  description: Use and leverage Bolna Voice AI using APIs through HTTP requests from any language in your applications and workflows.
  license:
    name: MIT
  version: 1.0.0
servers:
  - url: https://api.bolna.ai
    description: Production server
security:
  - bearerAuth: []
paths:
  /agent:
    post:
      description: Creates a new agent
      requestBody:
        description: Creates a new agent
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRequest'
        required: true
      responses:
        '200':
          description: agent status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCreateStatus'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /agent/all:
    get:
      description: List all agents
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentList'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /agent/{agent_id}:
    get:
      description: Retrieve an agent
      parameters:
        - in: "path"
          name: "agent_id"
          required: true
          schema:
            type: "string"
            format: uuid
      responses:
        '200':
          description: Agent response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      description: Update an agent
      parameters:
        - in: "path"
          name: "agent_id"
          required: true
          schema:
            type: "string"
            format: uuid
      requestBody:
        description: Update an agent
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRequest'
        required: true
      responses:
        '200':
          description: agent status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentUpdateStatus'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      description: Patch update an agent
      parameters:
        - in: "path"
          name: "agent_id"
          required: true
          schema:
            type: "string"
            format: uuid
      requestBody:
        description: Update an agent
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentPatchRequest'
        required: true
      responses:
        '200':
          description: agent status response
          content:
            application/json:
              example:
                message: success
                state: updated
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v2/agent:
    post:
      description: Creates a new agent
      requestBody:
        description: Creates a new agent
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRequestV2'
        required: true
      responses:
        '200':
          description: agent status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCreateStatus'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v2/agent/all:
    get:
      description: List all agents
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListV2'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v2/agent/{agent_id}/stop:
    post:
      description: Stop all queued calls for a given agent_id
      parameters:
        - in: "path"
          name: "agent_id"
          required: true
          schema:
            type: "string"
            format: uuid
      responses:
        '200':
          description: agent execution stopped response
          content:
            application/json:
              example:
                stopped_executions : ["c8098ad0-29f6-456d-1234-7b93ad224059"]
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v2/agent/{agent_id}:
    get:
      description: Retrieve an agent
      parameters:
        - in: "path"
          name: "agent_id"
          required: true
          schema:
            type: "string"
            format: uuid
      responses:
        '200':
          description: Agent response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentV2'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      description: Update an agent
      parameters:
        - in: "path"
          name: "agent_id"
          required: true
          schema:
            type: "string"
            format: uuid
      requestBody:
        description: Update an agent
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRequestV2'
        required: true
      responses:
        '200':
          description: agent status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentUpdateStatus'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      description: Patch update an agent
      parameters:
        - in: "path"
          name: "agent_id"
          required: true
          schema:
            type: "string"
            format: uuid
      requestBody:
        description: Update an agent
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentPatchRequest'
        required: true
      responses:
        '200':
          description: agent status response
          content:
            application/json:
              example:
                message: success
                state: updated
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      description: Delete an agent
      parameters:
        - in: "path"
          name: "agent_id"
          required: true
          schema:
            type: "string"
            format: uuid
      responses:
        '200':
          description: agent deleted response
          content:
            application/json:
              example:
                message: success
                state: deleted
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v2/agent/{agent_id}/executions:
    get:
      description: Retrieve all executions by an agent
      parameters:
        - in: "path"
          name: "agent_id"
          required: true
          schema:
            type: "string"
            format: uuid
          description: The unique `id` of the agent

        - in: "query"
          name: "page_number"
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: The page number to retrieve (starts from `1`)

        - in: "query"
          name: "page_size"
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
          description: Number of results per page. Maximum allowed is `50`.

        - in: "query"
          name: "status"
          required: false
          schema:
            type: string
            enum:
              - scheduled
              - queued
              - rescheduled
              - ringing
              - initiated
              - in-progress
              - call-disconnected
              - completed
              - balance-low
              - busy
              - no-answer
              - canceled
              - failed
              - stopped
              - error
            description: Fetch executions filtered by call status. [List of all call statuses](/list-phone-call-status).

        - in: "query"
          name: "call_type"
          required: false
          schema:
            type: string
            enum:
              - inbound
              - outbound
            description: Filter `inbound` calls or `outbound` calls.

        - in: "query"
          name: "provider"
          required: false
          schema:
            type: string
            enum:
              - plivo
              - twilio
              - websocket
              - web-call
            description: Filter by conversation provider.

        - in: "query"
          name: "answered_by_voice_mail"
          required: false
          schema:
            type: boolean
            default: false
            description: Filter by voicemail.

        - in: "query"
          name: "batch_id"
          required: false
          schema:
            type: string
            default: null
            description: Filter executions by a specific `batch_id`.

        - in: "query"
          name: "from"
          required: false
          schema:
            type: string
            format: date-time
            example: "2025-05-07T00:00:00.000Z"
            description: Fetch executions where the `created_at` timestamp is greater than or equal to this UTC datetime in ISO 8601 format with UTC indication.

        - in: "query"
          name: "to"
          required: false
          schema:
            type: string
            format: date-time
            example: "2025-05-14T00:00:00.000Z"
            description: Fetch executions where the `created_at` timestamp is less than or equal to this UTC datetime in ISO 8601 format with UTC indication.

      responses:
        '200':
          description: List of all executions by an agent sorted by last run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentExecutionV2List'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /agent/{agent_id}/executions:
    get:
      description: Retrieve all executions by an agent
      parameters:
        - in: "path"
          name: "agent_id"
          required: true
          schema:
            type: "string"
            format: uuid
          description: The unique `id` of the agent
      responses:
        '200':
          description: List of all executions by an agent sorted by last run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentExecutionList'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /agent/{agent_id}/execution/{execution_id}:
    get:
      description: Retrieve specific execution by an agent
      parameters:
        - in: "path"
          name: "agent_id"
          required: true
          schema:
            type: "string"
            format: uuid
          description: The unique `id` of the agent
        - in: "path"
          name: "execution_id"
          required: true
          schema:
            type: "string"
            format: uuid
          description: The unique `execution_id` by the agent
      responses:
        '200':
          description: Retrieve specific execution by an agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentExecution'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /executions/{execution_id}:
    get:
      description: Retrieve specific execution by `execution_id`
      parameters:
        - in: "path"
          name: "execution_id"
          required: true
          schema:
            type: "string"
            format: uuid
          description: The unique `execution_id`
      responses:
        '200':
          description: Retrieve specific execution by an agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentExecution'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /executions/{execution_id}/log:
    get:
      description: Retrieve raw logs of specific `execution_id`
      parameters:
        - in: "path"
          name: "execution_id"
          required: true
          schema:
            type: "string"
            format: uuid
          description: The unique `execution_id`
      responses:
        '200':
          description: Retrieve specific execution raw logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentExecutionLogList'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /batches:
    post:
      description: Create batch for agent
      requestBody:
        content:
          text/csv:
            schema:
              type: object
              properties:
                agent_id:
                  type: string
                  format: uuid
                  description: The ID of the agent
                file:
                  type: string
                  format: binary
                  description: CSV file to upload
                from_phone_numbers:
                  type: array
                  items:
                    type: string
                  description: List of phone numbers from which the batch calls will be made. Each number must include the country code in [E.164](https://en.wikipedia.org/wiki/E.164) format. Pass multiple values to use multiple originating numbers.
                  example: ["+919876543210", "+919876543211"]
                retry_config:
                  type: string
                  description: JSON string containing retry configuration for failed calls. See [auto-retry documentation](/auto-retry) for details. Example - `{"enabled":true,"max_retries":2,"retry_intervals_minutes":[15,30]}`
              required:
                - agent_id
                - file
      responses:
        '200':
          description: agent status response
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch_id:
                    type: string
                    description: The ID of the batch
                    format: ^[0-9a-fA-F]{32}$
                    example: 3c90c3cc0d444b5088888dd25736052a
                  state:
                    type: string
                    description: Status of the request
                    enum:
                      - created
                required:
                  - batch_id
                  - state
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /batches/{agent_id}/all:
    get:
      description: List all batches for agent
      parameters:
        - in: "path"
          name: "agent_id"
          required: true
          description: The ID of the agent
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: list batches response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchList'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /batches/{batch_id}:
    get:
      description: Retrieve a batch
      parameters:
        - in: "path"
          name: "batch_id"
          required: true
          description: The ID of the batch
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: agent status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Batch'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      description: Delete a batch
      parameters:
        - in: "path"
          name: "batch_id"
          required: true
          description: The ID of the batch
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: batch deleted response
          content:
            application/json:
              example:
                message: success
                state: deleted
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /batches/{batch_id}/executions:
    get:
      description: Retrieve all executions from a batch
      parameters:
        - in: "path"
          name: "batch_id"
          required: true
          description: The ID of the batch
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: agent status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentExecutionList'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /batches/{batch_id}/stop:
    post:
      description: Stop a running batch
      parameters:
        - in: "path"
          name: "batch_id"
          required: true
          description: The ID of the batch
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: batch status response
          content:
            application/json:
              example:
                message: success
                state: stopped
        '404':
          description: batch status response
          content:
            application/json:
              example:
                message: Batch is not queued or running
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /batches/{batch_id}/schedule:
    post:
      description: Schedule a batch for calling via agent
      parameters:
        - in: "path"
          name: "batch_id"
          required: true
          description: The ID of the batch
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                scheduled_at:
                  type: string
                  example: 2024-06-05T04:10:00+05:30
                  description: The scheduled date and time in ISO 8601 format with time zone
                bypass_call_guardrails:
                  type: boolean
                  default: false
                  description: Skip time validation for all calls in this batch
              required:
                - batch_id
                - scheduled_at
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                message: success
                state: scheduled
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /call:
    post:
      description: Initiate calls
      requestBody:
        description: Make a phone call from agent
        content:
          application/json:
            schema:
              required:
                - agent_id
                - recipient_phone_number
              properties:
                agent_id:
                  type: string
                  format: uuid
                  description: Agent `id` which will initiate the outbound call
                recipient_phone_number:
                  type: string
                  description: Phone number of the recipient alongwith country code (in [E.164](https://en.wikipedia.org/wiki/E.164) format)
                from_phone_number:
                  type: string
                  description: Phone number of the sender alongwith country code (in [E.164](https://en.wikipedia.org/wiki/E.164) format)
                scheduled_at:
                  type: string
                  example: "2024-06-05T16:35:00.000+05:30"
                  description: The scheduled date and time in ISO 8601 format with time zone
                user_data:
                  type: object
                  description: Additional user dynamic variables as defined in the agent prompt
                  additionalProperties: true
                agent_data:
                  type: object
                  description: Agent configuration to override the default configuration. Currently, only `voice_id` for the same provider is supported.
                retry_config:
                  type: object
                  description: Configuration for auto-retry of failed calls. See [auto-retry documentation](/auto-retry) for details.
                  properties:
                    enabled:
                      type: boolean
                      default: false
                      description: Enable auto-retry for this call
                    max_retries:
                      type: integer
                      minimum: 1
                      maximum: 3
                      default: 3
                      description: Maximum retry attempts (1-3)
                    retry_on_statuses:
                      type: array
                      items:
                        type: string
                        enum: [no-answer, busy, failed, error]
                      default: [no-answer, busy, failed]
                      description: Call statuses that trigger a retry
                    retry_on_voicemail:
                      type: boolean
                      default: false
                      description: Whether to retry if call reaches voicemail
                    retry_intervals_minutes:
                      type: array
                      items:
                        type: integer
                      default: [30, 60, 120]
                      description: Delay in minutes before each retry attempt
                bypass_call_guardrails:
                  type: boolean
                  default: false
                  description: Skip time validation checks and make call immediately regardless of agent's calling_guardrails configuration
            examples:
              example-1:
                summary: Example of initiating a call
                value:
                  agent_id: "123e4567-e89b-12d3-a456-426655440000"
                  recipient_phone_number: "+10123456789"
                  from_phone_number: "+19876543007"
                  scheduled_at": "2025-08-21T10:35:00"
                  user_data:
                    variable1: "value1"
                    variable2: "value2"
                    variable3: "some phrase as value"
                  agent_data:
                    voice_id: "Sam"
        required: true
      responses:
        '200':
          description: agent status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MakeCallStatus'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /call/{execution_id}/stop:
    post:
      description: Stop a queued or scheduled call
      parameters:
        - in: "path"
          name: "execution_id"
          required: true
          description: The ID of the call
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: call status response
          content:
            application/json:
              example:
                message: done
                status: stopped
                execution_id: 123e4567-e89b-12d3-a456-426655440000
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /providers:
    get:
      description: List all providers
      responses:
        '200':
          description: providers status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderList'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      description: Add provider
      requestBody:
        description: Add a new provider
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderRequest'
        required: true
      responses:
        '200':
          description: agent status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderAddedStatus'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /providers/{provider_key_name}:
    delete:
      description: Remove provider
      parameters:
        - in: "path"
          name: "provider_key_name"
          required: true
          description: Name of the provider
          schema:
            type: "string"
            example: OPENAI_API_KEY
      responses:
        '200':
          description: agent status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderRemoveStatus'
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /inbound/setup:
    post:
      description: Add agent for inbound calls with optional IVR configuration
      requestBody:
        content:
          application/json:
            schema:
              required:
                - agent_id
                - phone_number_id
              properties:
                agent_id:
                  type: string
                  format: uuid
                  description: Agent `id` which will handle inbound calls. Used as default if no IVR option-level agent is set.
                  example: "3c90c3cc-0d44-4b50-8888-8dd25736052a"
                phone_number_id:
                  type: string
                  format: uuid
                  pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
                  example: '123e4567-e89b-12d3-a456-426614174000'
                  description: Telephone number `id` from [Phone number list API](/docs/api-reference/phone-numbers/get_all)
                allow_multiple:
                  type: boolean
                  default: false
                  example: true
                  description: Allow this phone number to be linked to multiple phone numbers for the same agent. Only applicable for Plivo phone numbers.
                ivr_config:
                  type: object
                  description: Optional IVR configuration for Plivo phone numbers. See [IVR documentation](/ivr-inbound-calls) for details.
                  properties:
                    enabled:
                      type: boolean
                      description: Enable or disable IVR
                      example: true
                    voice:
                      type: string
                      description: Text-to-speech voice (e.g., Polly.Aditi, Polly.Joanna)
                      example: "Polly.Aditi"
                    welcome_message:
                      type: string
                      description: Message played when call connects
                      example: "Welcome to Acme Corp."
                    timeout:
                      type: integer
                      description: Seconds to wait for input
                      example: 7
                    max_retries:
                      type: integer
                      description: Retry attempts on invalid input
                      example: 2
                    steps:
                      type: array
                      description: IVR flow steps (menu or collect)
                      items:
                        type: object
                        properties:
                          step_id:
                            type: string
                          type:
                            type: string
                            enum: [menu, collect]
                          prompt:
                            type: string
                          field_name:
                            type: string
                          options:
                            type: array
                            items:
                              type: object
                          next_step:
                            type: string
                          conditional_next:
                            type: object
