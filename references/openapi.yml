          title: route
          description: These are predefined routes that can be used to answer FAQs, or set basic guardrails, or do a static function call.
      type: object
      title: Routes

    Route:
      properties:
        route_name:
          type: string
          title: Route Name
          example: politics
        utterances:
          items:
            type: string
          type: array
          title: Utterances
          example:
            - 'Who do you think will win the elections?'
            - 'Whom would you vote for?'
          description: This is an array of utterances which when spoken you want to send a static response
        response:
          anyOf:
            - items:
                type: string
              type: array
            - type: string
          example: Hey, thanks but I do not have opinions on politics
          title: Response
          description: It can be a stand alone string or array of responses. If it's an array the length should be same as number of utterances and a particular index will be matched before returning
        score_threshold:
