    Error:
      required:
        - error
        - message
      type: object
      properties:
        error:
          type: integer
          format: int32
        message:
          type: string

    AddModelResponse:
      properties:
        message:
          type: string
          example: model added successfully
          description: Success message for adding the custom model
        status:
          type: string
          enum:
            - added
          example: added
          description: status for the model sent in the request to be added
      type: object
      title: addmodelstatus

    AccessDenied:
      required:
        - error
        - message
      type: object
      properties:
        error:
          type: integer
          format: int32
          example: 401
        message:
          type: string
          example: Access denied

    SIPTrunkGateway:
      type: object
      required:
        - gateway_address
      properties:
        gateway_address:
          type: string
          description: Hostname or IP of the SIP gateway
          example: "sip.zadarma.com"
        port:
          type: integer
          default: 5060
          description: SIP port
          example: 5060
        priority:
          type: integer
          default: 1
          description: Gateway priority (lower = higher priority)
          example: 1

    SIPTrunkIPIdentifier:
      type: object
      required:
        - ip_address
      properties:
        ip_address:
          type: string
          description: IP address or CIDR range for IP-based authentication
          example: "15.207.90.192/31"

    SIPTrunkCreateRequest:
      type: object
      required:
        - name
        - provider
        - auth_type
        - gateways
      properties:
        name:
          type: string
          description: Human-readable label. Must be unique per account.
          example: "Zadarma Production"
        provider:
          type: string
          description: SIP provider name (e.g. twilio, plivo, zadarma, telnyx, vonage, custom)
          example: "zadarma"
        description:
          type: string
          description: Optional description for internal reference
        auth_type:
          type: string
          enum: [userpass, ip-based]
          description: Authentication method
          example: "userpass"
        auth_username:
          type: string
          description: SIP username. Required when auth_type is userpass.
        auth_password:
          type: string
          description: SIP password. Required when auth_type is userpass.
        gateways:
          type: array
          items:
            $ref: '#/components/schemas/SIPTrunkGateway'
          description: At least one gateway is required
        ip_identifiers:
          type: array
          items:
            $ref: '#/components/schemas/SIPTrunkIPIdentifier'
          description: Required when auth_type is ip-based
        allow:
          type: string
          default: "ulaw,alaw"
          description: Comma-separated codecs to allow
        disallow:
          type: string
          default: "all"
          description: Comma-separated codecs to disallow
        transport:
          type: string
          enum: [transport-udp, transport-tcp, transport-tls]
          default: "transport-udp"
          description: SIP transport protocol.
        direct_media:
          type: boolean
          default: false
          description: RTP directly between caller and callee. Keep false.
        rtp_symmetric:
          type: boolean
          default: true
          description: Symmetric RTP. Required for NAT.
        force_rport:
          type: boolean
          default: true
          description: Force responses to source port. Required for NAT.
        media_encryption:
          type: string
          enum: [no, sdes]
          default: "no"
          description: RTP encryption. Use "sdes" for SRTP. Requires transport=transport-tls.
        media_encryption_optimistic:
          type: boolean
          default: false
          description: When media_encryption=sdes, fall back to clear RTP if the carrier does not offer crypto in its SDP.
        qualify_frequency:
          type: integer
          default: 60
          description: SIP OPTIONS ping interval in seconds. 0 to disable.
        inbound_enabled:
          type: boolean
          default: false
          description: Set true to receive inbound calls on this trunk
        outbound_leading_plus_enabled:
          type: boolean
          default: true
          description: Prepend + to outbound dialed numbers
        phone_numbers:
          type: array
          items:
            $ref: '#/components/schemas/SIPTrunkPhoneNumberRequest'
          description: Optional phone numbers to add at creation time

    SIPTrunkUpdateRequest:
      type: object
      description: Fields to update on an existing SIP trunk. Only provided fields are changed.
      properties:
        name:
          type: string
          description: Updated human-readable trunk name.
        description:
          type: string
          description: Updated trunk description for internal reference.
        auth_username:
          type: string
          description: Updated SIP username (used only when the trunk uses userpass authentication).
        auth_password:
          type: string
          description: Updated SIP password (used only when the trunk uses userpass authentication).
        gateways:
          type: array
          description: Replaces existing gateways when provided.
          items:
            $ref: '#/components/schemas/SIPTrunkGateway'
        ip_identifiers:
          type: array
          description: Replaces existing IP identifiers when provided.
          items:
            $ref: '#/components/schemas/SIPTrunkIPIdentifier'
        allow:
          type: string
          description: Comma-separated codecs to allow (e.g., "ulaw,alaw").
        disallow:
          type: string
          description: Comma-separated codecs to disallow (typically "all").
        inbound_enabled:
          type: boolean
          description: Enable or disable inbound calling on this trunk.
        outbound_leading_plus_enabled:
          type: boolean
          description: Whether to prepend a leading + to outbound dialed numbers.
        is_active:
          type: boolean
          description: Activate or deactivate the trunk. When false, calls will not be placed.
        qualify_frequency:
          type: integer
          description: SIP OPTIONS ping interval in seconds. Use 0 to disable.
        transport:
          type: string
          enum: [transport-udp, transport-tcp, transport-tls]
          description: SIP transport protocol.
        media_encryption:
          type: string
          enum: [no, sdes]
          description: RTP encryption. "sdes" requires transport=transport-tls.
        media_encryption_optimistic:
          type: boolean
          description: When media_encryption=sdes, fall back to clear RTP if the carrier does not offer crypto in its SDP.

    SIPTrunkResponse:
      type: object
      description: SIP trunk object returned by the API.
      properties:
        id:
          type: string
          description: Unique SIP trunk identifier.
        name:
          type: string
          description: Human-readable trunk name.
        provider:
          type: string
          description: SIP provider name (e.g., twilio, plivo, zadarma, telnyx, vonage, custom).
        description:
          type: string
          description: Optional trunk description for internal reference.
        auth_type:
          type: string
          enum: [userpass, ip-based]
          description: Authentication method used for this trunk.
        auth_username:
          type: string
          description: SIP username (present only for userpass trunks).
        gateways:
          type: array
          description: Ordered list of SIP gateways used for registration and call routing.
          items:
            $ref: '#/components/schemas/SIPTrunkGateway'
        ip_identifiers:
          type: array
          description: IP ranges associated with this trunk (used only for ip-based authentication).
          items:
            $ref: '#/components/schemas/SIPTrunkIPIdentifier'
        phone_numbers:
          type: array
          description: Phone numbers (DIDs) registered on this trunk.
          items:
            $ref: '#/components/schemas/SIPTrunkPhoneNumberResponse'
        allow:
          type: string
          description: Comma-separated codecs to allow.
        disallow:
          type: string
          description: Comma-separated codecs to disallow.
        transport:
          type: string
          enum: [transport-udp, transport-tcp, transport-tls]
          description: SIP transport used by the trunk.
        direct_media:
          type: boolean
          description: Whether RTP is routed directly between endpoints (typically false).
        rtp_symmetric:
          type: boolean
          description: Enables symmetric RTP to handle NAT.
        force_rport:
          type: boolean
          description: Forces responses to the source port to handle NAT.
        media_encryption:
          type: string
          enum: [no, sdes]
          description: RTP encryption mode. "no" for plain RTP, "sdes" for SRTP via SDES (TLS trunks only).
        media_encryption_optimistic:
          type: boolean
          description: When media_encryption=sdes, whether to fall back to clear RTP if the carrier does not offer crypto.
        qualify_frequency:
          type: integer
          description: SIP OPTIONS ping interval in seconds.
        inbound_enabled:
          type: boolean
          description: Whether inbound calling is enabled.
        outbound_leading_plus_enabled:
          type: boolean
          description: Whether to prepend a leading + to outbound dialed numbers.
        is_active:
          type: boolean
          description: Whether the trunk is active.
        created_at:
          type: string
          format: date-time
          description: ISO timestamp when the trunk was created.
        updated_at:
          type: string
          format: date-time
          description: ISO timestamp when the trunk was last updated.

    SIPTrunkPhoneNumberRequest:
      type: object
      required:
