          example: "submitted"
        created_at:
          type: string
          format: date-time
          description: ISO timestamp when the violation was created.
          example: "2026-03-06T08:25:53.514276+00:00"
        updated_at:
          type: string
          format: date-time
          description: ISO timestamp when the violation was last updated.
          example: "2026-03-09T07:10:29.135591+00:00"
        user_id:
