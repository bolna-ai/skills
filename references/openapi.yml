        supports_custom_questions:
          type: boolean
          description: Whether this template supports custom questions.
          default: false
        created_at:
          type: string
          format: date-time
          description: ISO timestamp when the template was created.
        updated_at:
          type: string
          format: date-time
          description: ISO timestamp when the template was last updated.

    ExtractionTemplateCreate:
