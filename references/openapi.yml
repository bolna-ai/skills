          additionalProperties:
            type: object
            additionalProperties:
              type: object
              properties:
                duration:
                  type: number
                  example: 125.5993724
                cost:
                  type: number
                  example: 1.233
        llm_cost_map:
          type: object
          properties:
            cost:
